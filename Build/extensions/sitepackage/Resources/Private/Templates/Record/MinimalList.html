<html data-namespace-typo3-fluid="true" xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers">

<h1>Minimal records</h1>
<ul>
    <f:for each="{records}" as="record">
        <li>
            <f:link.action action="minimalDetail" arguments="{minimal: record}">{record.title}</f:link.action>
        </li>
    </f:for>
</ul>

</html>
